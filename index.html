          Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
          XCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>,
          Lightbulb: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>,
          Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
          Minus: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
          Save: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
          Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
          Message: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
          Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
          Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
          BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
          Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        };

        function App() {
          const [userInfo, setUserInfo] = useState({ name: '', role: 'pro', acNumber: '', booth: '', smsNumber: '56070' });
          const [activeTab, setActiveTab] = useState('home');
          const [completedTasks, setCompletedTasks] = useState({});
          const [currentStageId, setCurrentStageId] = useState('dc');
          
          // EVM Main Tally
          const [tally, setTally] = useState({ male: 0, female: 0, tg: 0 });
          // Special Votes Tally
          const [specialVotes, setSpecialVotes] = useState({ tendered: 0, challenged: 0, test: 0, asd: 0, proxy: 0, blind: 0 });
          // Test Vote Log for 17C
          const [testVoteText, setTestVoteText] = useState("");

          const [tallyReports, setTallyReports] = useState([]); 
          const [completedForms, setCompletedForms] = useState({}); 

          const tallyRef = useRef(tally);
          useEffect(() => {
            tallyRef.current = tally;
          }, [tally]);

          // Load on mount
          useEffect(() => {
            const savedUser = localStorage.getItem('poll_userInfo');
            const savedTasks = localStorage.getItem('poll_tasks');
            const savedStage = localStorage.getItem('poll_stage');
            const savedTally = localStorage.getItem('poll_tally');
            const savedSpecial = localStorage.getItem('poll_special');
            const savedTestText = localStorage.getItem('poll_test_text');
            const savedReports = localStorage.getItem('poll_reports');
            const savedForms = localStorage.getItem('poll_forms');

            if (savedUser) setUserInfo(JSON.parse(savedUser));
            if (savedTasks) setCompletedTasks(JSON.parse(savedTasks));
            if (savedStage) setCurrentStageId(savedStage);
            if (savedTally) setTally(JSON.parse(savedTally));
            if (savedSpecial) setSpecialVotes(JSON.parse(savedSpecial));
            if (savedTestText) setTestVoteText(savedTestText);
            if (savedReports) setTallyReports(JSON.parse(savedReports));
            if (savedForms) setCompletedForms(JSON.parse(savedForms));
          }, []);

          // Save on change
          useEffect(() => {
            localStorage.setItem('poll_userInfo', JSON.stringify(userInfo));
            localStorage.setItem('poll_tasks', JSON.stringify(completedTasks));
            localStorage.setItem('poll_stage', currentStageId);
            localStorage.setItem('poll_tally', JSON.stringify(tally));
            localStorage.setItem('poll_special', JSON.stringify(specialVotes));
            localStorage.setItem('poll_test_text', testVoteText);
            localStorage.setItem('poll_reports', JSON.stringify(tallyReports));
            localStorage.setItem('poll_forms', JSON.stringify(completedForms)); 
          }, [userInfo, completedTasks, currentStageId, tally, specialVotes, testVoteText, tallyReports, completedForms]);

          // --- AUTO-SAVE 2-HOURLY REPORTS LOGIC ---
          useEffect(() => {
            const interval = setInterval(() => {
              const now = new Date();
              const h = now.getHours();
              const m = now.getMinutes();
              
              const slots = {
                9: '9 AM', 11: '11 AM', 13: '1 PM', 15: '3 PM', 17: '5 PM', 18: '6 PM (Final)'
              };

              if (slots[h] && m >= 0 && m <= 5) {
                setTallyReports(prev => {
                  const label = slots[h];
                  if (prev.some(r => r.timeLabel === label)) return prev;

                  const currentTally = tallyRef.current;
                  const total = currentTally.male + currentTally.female + currentTally.tg;

                  const newReport = {
                    id: Date.now(),
                    timeLabel: label,
                    total: total,
                    male: currentTally.male,
                    female: currentTally.female,
                    tg: currentTally.tg,
                    timestamp: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + ' (Auto)'
                  };
                  return [...prev, newReport];
                });
              }
            }, 30000); 
            return () => clearInterval(interval);
          }, []);

          const toggleTask = (taskId) => {
            setCompletedTasks(prev => ({
              ...prev,
              [taskId]: !prev[taskId]
            }));
          };

          const toggleFormTask = (formId) => {
            setCompletedForms(prev => ({
              ...prev,
              [formId]: !prev[formId]
            }));
          };

          const clearAllData = () => {
            if(window.confirm("সতর্কতা: আপনি কি অ্যাপের সমস্ত ডেটা মুছে ফেলতে চান? এটি আর ফিরিয়ে আনা যাবে না।")) {
              localStorage.clear();
              setUserInfo({ name: '', role: 'pro', acNumber: '', booth: '', smsNumber: '56070' });
              setCompletedTasks({});
              setCurrentStageId('dc');
              setTally({ male: 0, female: 0, tg: 0 });
              setSpecialVotes({ tendered: 0, challenged: 0, test: 0, asd: 0, proxy: 0, blind: 0 });
              setTestVoteText("");
              setTallyReports([]);
              setCompletedForms({});
              setActiveTab('home');
              window.scrollTo(0, 0);
            }
          };

          const totalVotes = tally.male + tally.female + tally.tg;

          return (
            <div className="flex flex-col h-screen bg-slate-50 font-sans text-slate-800">
              <header className="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center shrink-0 z-10">
                <div>
                  <h1 className="font-bold text-xl leading-tight tracking-tight">ভোটকর্মী সহায়িকা</h1>
                  {userInfo.booth ? (
                    <p className="text-xs text-blue-200 mt-0.5">বুথ {userInfo.booth} • AC {userInfo.acNumber}</p>
                  ) : (
                    <p className="text-xs text-blue-200 mt-0.5">Election Duty 2026</p>
                  )}
                </div>
                <div className="bg-blue-900 px-3 py-1.5 rounded-lg border border-blue-700 text-center shadow-inner">
                  <p className="text-[10px] text-blue-300 uppercase tracking-wider font-bold">Total EVM Votes</p>
                  <p className="font-black text-lg leading-none mt-0.5">{totalVotes}</p>
                </div>
              </header>

              <main className="flex-1 overflow-y-auto pb-24">
                {activeTab === 'home' && (
                  <Dashboard 
                    userInfo={userInfo}
                    setUserInfo={setUserInfo}
                    currentStageId={currentStageId} 
                    setCurrentStageId={setCurrentStageId}
                    completedTasks={completedTasks}
                    setActiveTab={setActiveTab}
                    clearAllData={clearAllData}
                  />
                )}
                {activeTab === 'myrole' && <RoleGuide defaultRole={getRoleKey(userInfo.role)} />}
                {activeTab === 'checklist' && (
                  <ChecklistView 
                    currentStageId={currentStageId} 
                    setCurrentStageId={setCurrentStageId}
                    completedTasks={completedTasks}
                    toggleTask={toggleTask}
                    setActiveTab={setActiveTab}
                  />
                )}
                {activeTab === 'tally' && (
                  <TallyCounter 
                    tally={tally} 
                    setTally={setTally} 
                    totalVotes={totalVotes}
                    tallyReports={tallyReports}
                    setTallyReports={setTallyReports}
                    specialVotes={specialVotes}
                    setSpecialVotes={setSpecialVotes}
                    testVoteText={testVoteText}
                    setTestVoteText={setTestVoteText}
                  />
                )}
                {activeTab === 'sms' && <SmsPanel userInfo={userInfo} tally={tally} tallyReports={tallyReports} />}
                {activeTab === 'guide' && <GuideSection completedForms={completedForms} toggleFormTask={toggleFormTask} />}
              </main>

              {/* BOTTOM NAVIGATION (6 Tabs) */}
              <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-between px-2 py-2 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
                <NavButton active={activeTab === 'home'} onClick={() => setActiveTab('home')} icon={<Icons.Home />} label="হোম" />
                <NavButton active={activeTab === 'myrole'} onClick={() => setActiveTab('myrole')} icon={<Icons.User />} label="ডিউটি" />
                <NavButton active={activeTab === 'checklist'} onClick={() => setActiveTab('checklist')} icon={<Icons.Check />} label="চেকলিস্ট" />
                <NavButton active={activeTab === 'tally'} onClick={() => setActiveTab('tally')} icon={<Icons.Activity />} label="ট্যালি" pulse={currentStageId === 'live'} />
                <NavButton active={activeTab === 'sms'} onClick={() => setActiveTab('sms')} icon={<Icons.Message />} label="SMS" />
                <NavButton active={activeTab === 'guide'} onClick={() => setActiveTab('guide')} icon={<Icons.BookOpen />} label="গাইড" />
              </nav>
            </div>
          );
        }

        // --- HELPER FUNCTION ---
        function getRoleKey(roleStr) {
          if (roleStr.includes('1st') || roleStr === 'p1') return 'p1';
          if (roleStr.includes('2nd') || roleStr === 'p2') return 'p2';
          if (roleStr.includes('3rd') || roleStr === 'p3') return 'p3';
          return 'pro';
        }

        function NavButton({ active, onClick, icon, label, pulse }) {
          return (
            <button onClick={onClick} className={`flex flex-col items-center p-1.5 w-14 relative transition-colors rounded-xl ${active ? 'text-blue-600 bg-blue-50' : 'text-slate-400 hover:bg-slate-50'}`}>
              <div className={`mb-1 transition-transform ${active ? 'scale-110' : ''}`}>
                {icon}
                {pulse && !active && <span className="absolute top-1 right-2 w-2 h-2 bg-red-500 rounded-full animate-ping"></span>}
                {pulse && !active && <span className="absolute top-1 right-2 w-2 h-2 bg-red-500 rounded-full"></span>}
              </div>
              <span className="text-[9px] font-bold tracking-wide">{label}</span>
            </button>
          );
        }

        // --- DASHBOARD ---
        function Dashboard({ userInfo, setUserInfo, currentStageId, setCurrentStageId, completedTasks, setActiveTab, clearAllData }) {
          const currentStageIndex = STAGES.findIndex(s => s.id === currentStageId);
          
          const handleProfileChange = (field, value) => {
            setUserInfo(prev => ({ ...prev, [field]: value }));
          };

          return (
            <div className="space-y-6 p-1">
              
              {/* PROFILE SETUP CARD */}
              <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
                <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-3">
                  <Icons.User /> প্রোফাইল ও বুথ সেটআপ
                </h3>
                <div className="space-y-3">
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">আপনার নাম</label>
                      <input type="text" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium focus:outline-none focus:border-blue-400" 
                        value={userInfo.name} onChange={e => handleProfileChange('name', e.target.value)} placeholder="নাম" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">পদ (Role)</label>
                      <select className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium focus:outline-none focus:border-blue-400"
                        value={userInfo.role} onChange={e => handleProfileChange('role', e.target.value)}>
                        <option value="pro">PrO (প্রিসাইডিং)</option>
                        <option value="p1">PO-1</option>
                        <option value="p2">PO-2</option>
                        <option value="p3">PO-3</option>
                      </select>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">AC নং</label>
                      <input type="number" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium focus:outline-none focus:border-blue-400" 
                        value={userInfo.acNumber} onChange={e => handleProfileChange('acNumber', e.target.value)} placeholder="যেমন 142" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">বুথ নং</label>
                      <input type="number" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium focus:outline-none focus:border-blue-400" 
                        value={userInfo.booth} onChange={e => handleProfileChange('booth', e.target.value)} placeholder="যেমন 56" />
                    </div>
                  </div>
                  
                  {/* Show SMS number ONLY if role is PrO */}
                  {userInfo.role === 'pro' && (
                    <div className="pt-2 border-t border-slate-100 mt-2">
                      <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1 text-blue-600">SMS পাঠানোর নম্বর (Target No.)</label>
                      <input type="number" className="w-full p-2.5 bg-blue-50 border border-blue-200 rounded-lg text-sm font-bold text-blue-800 focus:outline-none focus:border-blue-400" 
                        value={userInfo.smsNumber} onChange={e => handleProfileChange('smsNumber', e.target.value)} placeholder="যেমন 56070" />
                    </div>
                  )}
                </div>
              </div>

              {/* PROGRESS BARS */}
              <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
                <h3 className="font-bold text-slate-800 mb-4 px-1">কাজের অগ্রগতি (Checklist Progress)</h3>
                <div className="space-y-4">
                  {STAGES.map(stage => {
                    const tasks = CHECKLIST_DATA[stage.id] || [];
                    const completed = tasks.filter(t => completedTasks[t.id]).length;
                    const total = tasks.length;
                    const percent = total === 0 ? 0 : Math.round((completed / total) * 100);

                    return (
                      <div key={stage.id} className="relative cursor-pointer" onClick={() => {setCurrentStageId(stage.id); setActiveTab('checklist');}}>
                        <div className="flex justify-between text-xs font-bold mb-1">
                          <span className={percent === 100 ? 'text-green-600' : 'text-slate-700'}>{stage.title}</span>
                          <span className={percent === 100 ? 'text-green-600' : 'text-blue-600'}>{percent}%</span>
                        </div>
                        <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden border border-slate-200/50">
                          <div 
                            className={`h-full transition-all duration-700 ${percent === 100 ? 'bg-green-500' : 'bg-blue-500'}`} 
                            style={{ width: `${percent}%` }}
                          ></div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* QUICK ACTIONS */}
              <div>
                <h3 className="font-bold text-slate-800 mb-3 px-1">কুইক অ্যাকশন (Quick Actions)</h3>
                <div className="grid grid-cols-2 gap-3">
                  <ActionCard title="SMS প্যানেল" desc="অটোমেটিক SMS পাঠান" color="border-blue-200 bg-blue-50" text="text-blue-800" onClick={() => setActiveTab('sms')} />
                  <ActionCard title="বিশেষ পরিস্থিতি" desc="চ্যালেঞ্জ, টেন্ডার ইত্যাদি" color="border-orange-200 bg-orange-50" text="text-orange-800" onClick={() => setActiveTab('guide')} />
                  <ActionCard title="মক পোল ক্লিয়ার" desc="CRC নিশ্চিতকরণ" color="border-red-200 bg-red-50" text="text-red-800" onClick={() => alert("মনে রাখবেন: Close -> Result -> Clear (CRC) করা বাধ্যতামূলক। Total=0 হতে হবে।")} />
                  <ActionCard title="হেল্প / ইমারজেন্সি" desc="সাধারণ সমস্যা" color="border-slate-200 bg-white" text="text-slate-800" onClick={() => setActiveTab('guide')} />
                </div>
              </div>

              {/* FACTORY RESET */}
              <div className="mt-8 mb-2">
                <button 
                  onClick={clearAllData} 
                  className="w-full bg-red-50 hover:bg-red-100 text-red-600 font-bold py-3.5 rounded-xl border border-red-200 transition-colors flex items-center justify-center gap-2 shadow-sm"
                >
                  <Icons.Trash /> সম্পূর্ণ অ্যাপ রিসেট করুন
                </button>
                <p className="text-[10px] text-center text-slate-400 mt-2 font-medium leading-relaxed">
                  নতুন ডিউটি শুরু করার আগে এটি ব্যবহার করুন।<br/>এটি চাপলে অফলাইনে সেভ থাকা সমস্ত ডেটা মুছে যাবে।
                </p>
                <div className="mt-6 pt-4 border-t border-slate-200 text-center">
                   <p className="text-xs font-bold text-slate-500">Prepared by Arnab Ganguli</p>
                </div>
              </div>
            </div>
          );
        }

        function ActionCard({ title, desc, color, text, onClick }) {
          return (
            <button onClick={onClick} className={`p-4 rounded-xl border text-left active:scale-95 transition-transform ${color} shadow-sm`}>
              <h4 className={`font-bold ${text} leading-tight`}>{title}</h4>
              <p className="text-[11px] font-medium opacity-80 mt-1">{desc}</p>
            </button>
          );
        }

        // --- NEW SMS PANEL COMPONENT WITH DROPDOWN ---
        function SmsPanel({ userInfo, tally, tallyReports }) {
          const [queueCount, setQueueCount] = useState('');
          const timeSlots = ["9 AM", "11 AM", "1 PM", "3 PM", "5 PM", "6 PM (Final)"];
          
          const [selectedTime, setSelectedTime] = useState(() => {
            const saved = localStorage.getItem('poll_sms_time');
            if (saved && timeSlots.includes(saved)) return saved;
            if (tallyReports && tallyReports.length > 0) return tallyReports[tallyReports.length - 1].timeLabel;
            return "9 AM";
          });

          useEffect(() => {
            localStorage.setItem('poll_sms_time', selectedTime);
          }, [selectedTime]);

          const sendSms = (text) => {
            if(!userInfo.smsNumber || !userInfo.acNumber || !userInfo.booth) {
               return alert("দয়া করে হোম পেজে গিয়ে আপনার AC নং, বুথ নং এবং SMS নম্বর আপডেট করুন।");
            }
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const separator = isIOS ? '&' : '?';
            window.location.href = `sms:${userInfo.smsNumber}${separator}body=${encodeURIComponent(text)}`;
          };

          const smsList = [
            { id: 'reg', label: 'Registration (ডিসি-তে পৌঁছে)', format: `WB EL ${userInfo.acNumber} P ${userInfo.booth}` },
            { id: 'safe_ps', label: 'Safe Arrival at PS (বুথে পৌঁছে)', format: `WB EL PS` },
            { id: 'mock', label: 'Mock Poll Completed (মক পোল শেষে)', format: `WB EL MOCK` },
            { id: 'start', label: 'Poll Start (ভোট শুরু হলে)', format: `WB EL START` },
            { id: 'end', label: 'Poll End (ভোট সমাপ্ত হলে)', format: `WB EL END` },
            { id: 'safe_rc', label: 'Safe Arrival at RC (RC-তে পৌঁছে)', format: `WB EL RC` }
          ];

          const selectedReport = tallyReports ? tallyReports.find(r => r.timeLabel === selectedTime) : null;
          const dataToSend = selectedReport || tally;
          const totalEvm = dataToSend.male + dataToSend.female + dataToSend.tg;

          return (
            <div className="space-y-6">
              <div className="bg-blue-900 text-white p-5 rounded-2xl shadow-md">
                <h2 className="text-xl font-bold flex items-center gap-2"><Icons.Message /> অটোমেটিক SMS প্যানেল</h2>
                <p className="text-xs text-blue-200 mt-1 leading-relaxed">বাটন চাপলেই আপনার ফোনের মেসেজ অ্যাপে টেক্সট অটোমেটিক লেখা হয়ে যাবে। শুধু Send করবেন।</p>
                <p className="text-xs font-bold text-blue-300 mt-2 bg-blue-800 inline-block px-2 py-1 rounded border border-blue-600">পাঠানোর নম্বর: {userInfo.smsNumber || 'সেট করা নেই'}</p>
              </div>

              {/* 2-Hourly Report (Auto Fetched from Selected Report or Tally) */}
              <div className="bg-indigo-50 border border-indigo-200 rounded-2xl p-5 shadow-sm">
                <h3 className="font-bold text-indigo-900 mb-4 flex items-center gap-2">
                  <Icons.Activity /> ২ ঘণ্টার রিপোর্ট (Cumulative)
                </h3>
                
                <div className="mb-4">
                  <label className="block text-[10px] font-bold text-indigo-600 uppercase mb-1.5">কোন সময়ের রিপোর্ট পাঠাবেন?</label>
                  <div className="relative">
                    <select 
                      className="w-full p-3 bg-white border border-indigo-300 rounded-xl focus:ring-2 focus:ring-indigo-500 font-bold text-indigo-900 outline-none appearance-none shadow-sm"
                      value={selectedTime}
                      onChange={(e) => setSelectedTime(e.target.value)}
                    >
                      {timeSlots.map(time => (
                        <option key={time} value={time}>{time} Report</option>
                      ))}
                    </select>
                    <div className="absolute right-4 top-4 text-indigo-400 pointer-events-none"><Icons.ChevronDown /></div>
                  </div>
                </div>

                {!selectedReport && (
                  <div className="bg-amber-100 border border-amber-300 text-amber-800 text-[10px] font-bold p-2.5 rounded-lg mb-4 flex items-start gap-2">
                    <span className="mt-0.5"><Icons.Alert /></span>
                    <p className="leading-snug">এই সময়ের কোনো ডেটা Tally ট্যাবে সেভ করা নেই। নিচে বর্তমান লাইভ ট্যালি দেখানো হচ্ছে। সঠিক ডেটা পাঠাতে আগে Tally ট্যাবে গিয়ে সেভ করুন।</p>
                  </div>
                )}
                
                <div className="bg-blue-100 border border-blue-300 text-blue-900 text-xs font-bold p-3 rounded-lg mb-4 text-center shadow-inner">
                  Total EVM Votes: {dataToSend.male} + {dataToSend.female} + {dataToSend.tg} = <span className="text-lg text-blue-700">{totalEvm}</span><br/>
                  <span className="text-[10px] text-blue-600 font-medium">(Excluding Tender Votes)</span>
                </div>
                
                <div className="flex gap-2 mb-4 bg-white p-3 rounded-xl border border-indigo-100">
                  <div className="flex-1 text-center border-r border-indigo-100">
                    <p className="text-[10px] text-slate-500 font-bold uppercase">Male</p>
                    <p className="font-black text-indigo-600">{dataToSend.male}</p>
                  </div>
                  <div className="flex-1 text-center border-r border-indigo-100">
                    <p className="text-[10px] text-slate-500 font-bold uppercase">Female</p>
                    <p className="font-black text-indigo-600">{dataToSend.female}</p>
                  </div>
                  <div className="flex-1 text-center">
                    <p className="text-[10px] text-slate-500 font-bold uppercase">Others</p>
                    <p className="font-black text-indigo-600">{dataToSend.tg}</p>
                  </div>
                </div>
                
                <div className="bg-slate-100 p-2 rounded-lg mb-3 border border-slate-200 font-mono text-sm text-slate-700 font-bold text-center">
                  WB EL {dataToSend.male} {dataToSend.female} {dataToSend.tg}
                </div>
                
                <button 
                  onClick={() => sendSms(`WB EL ${dataToSend.male} ${dataToSend.female} ${dataToSend.tg}`)}
                  className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md active:scale-95"
                >
                  <Icons.Send /> SMS পাঠান
                </button>
              </div>

              {/* Queue SMS */}
              <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 shadow-sm">
                <h3 className="font-bold text-amber-900 mb-2 flex items-center gap-2">
                  <Icons.User /> ৬টায় লাইনে থাকা ভোটার (Queue)
                </h3>
                <div className="flex gap-3 items-center mb-3">
                  <input 
                    type="number" 
                    placeholder="লাইনের শেষ সংখ্যা লিখুন" 
                    className="flex-1 p-3 rounded-xl border border-amber-300 focus:outline-none focus:ring-2 focus:ring-amber-500 bg-white text-amber-900 font-bold"
                    value={queueCount}
                    onChange={(e) => setQueueCount(e.target.value)}
                  />
                </div>
                <div className="bg-slate-100 p-2 rounded-lg mb-3 border border-slate-200 font-mono text-sm text-slate-700 font-bold text-center">
                  WB EL Q {queueCount || '0'}
                </div>
                <button 
                  onClick={() => {
                    if(!queueCount) return alert('দয়া করে কিউ-এ থাকা ভোটারের সংখ্যা লিখুন। কেউ না থাকলে 0 লিখুন।');
                    sendSms(`WB EL Q ${queueCount}`);
                  }}
                  className="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md active:scale-95"
                >
                  <Icons.Send /> SMS পাঠান
                </button>
              </div>

              {/* Standard Event SMS */}
              <div className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <h3 className="font-bold text-slate-800 mb-4">অন্যান্য ইভেন্ট SMS</h3>
                <div className="space-y-3">
                  {smsList.map((item, idx) => (
                    <div key={idx} className="flex justify-between items-center p-3 bg-slate-50 border border-slate-100 rounded-xl hover:bg-blue-50 transition-colors">
                      <div>
                        <p className="font-bold text-slate-700 text-sm">{item.label}</p>
                        <p className="font-mono text-[11px] text-slate-500 mt-1">{item.format}</p>
                      </div>
                      <button 
                        onClick={() => sendSms(item.format)}
                        className="bg-slate-800 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-sm hover:bg-blue-600 transition-colors active:scale-90"
                      >
                        <Icons.Send />
                      </button>
                    </div>
                  ))}
                </div>
              </div>
              
              <p className="text-[10px] text-slate-400 text-center px-4 leading-relaxed font-medium">সতর্কতা: SMS পাঠানোর আগে আপনার মোবাইলের সিগন্যাল ঠিক আছে কিনা দেখে নেবেন এবং ডেলিভারি রিপোর্ট চেক করবেন।</p>
            </div>
          );
        }

        // --- CHECKLIST VIEW ---
        function ChecklistView({ currentStageId, setCurrentStageId, completedTasks, toggleTask, setActiveTab }) {
          const stageTasks = CHECKLIST_DATA[currentStageId] || [];

          const roleColors = {
            all: 'bg-slate-100 text-slate-600',
            pro: 'bg-blue-100 text-blue-700',
            p1: 'bg-purple-100 text-purple-700',
            p2: 'bg-orange-100 text-orange-700',
            p3: 'bg-teal-100 text-teal-700'
          };
          
          const roleLabels = { all: 'টিম (Team)', pro: 'PrO', p1: 'P1', p2: 'P2', p3: 'P3' };

          return (
            <div className="space-y-4">
              <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex gap-2 overflow-x-auto no-scrollbar">
                {STAGES.map(stage => (
                  <button 
                    key={stage.id}
                    onClick={() => setCurrentStageId(stage.id)}
                    className={`whitespace-nowrap px-4 py-2.5 rounded-xl text-sm font-bold transition-all ${currentStageId === stage.id ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}
                  >
                    {stage.short}
                  </button>
                ))}
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden divide-y divide-slate-100">
                {stageTasks.length === 0 ? (
                  <p className="p-6 text-center text-slate-500 font-medium">এই পর্বে কোনো চেকলিস্ট নেই।</p>
                ) : (
                  stageTasks.map(task => {
                    const isDone = completedTasks[task.id];
                    return (
                      <div key={task.id} className={`p-4 transition-colors ${isDone ? 'bg-green-50/30' : 'hover:bg-slate-50'}`}>
                        <div className="flex items-start gap-4 cursor-pointer" onClick={() => toggleTask(task.id)}>
                          <div className="shrink-0 mt-0.5">
                            <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all
                              ${isDone ? 'bg-green-500 border-green-500 text-white scale-110' : 'border-slate-300 bg-white'}
                              ${task.critical && !isDone ? 'border-red-400 bg-red-50' : ''}
                            `}>
                              {isDone && <Icons.Check />}
                            </div>
                          </div>
                          <div className="flex-1">
                            <div className="flex items-center gap-2 mb-1.5">
                              <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded ${roleColors[task.role]}`}>
                                {roleLabels[task.role]}
                              </span>
                              {task.critical && !isDone && (
                                <span className="text-[10px] font-bold uppercase tracking-wider text-red-600 bg-red-100 px-2 py-0.5 rounded">অত্যন্ত জরুরি</span>
                              )}
                            </div>
                            <p className={`text-sm leading-relaxed ${isDone ? 'text-slate-400 line-through' : 'text-slate-800 font-medium'} ${task.critical && !isDone ? 'text-red-700' : ''}`}>
                              {task.text}
                            </p>
                            
                            {/* Checklist specific details */}
                            {task.details && (
                              <ul className={`mt-2 space-y-1.5 pl-1 ${isDone ? 'opacity-50 line-through' : ''}`}>
                                {task.details.map((detail, dIdx) => (
                                  <li key={dIdx} className="text-[13px] text-slate-600 font-medium flex gap-2 items-start">
                                    <span className="text-blue-400 mt-0.5">•</span>
                                    <span className="leading-snug">{detail}</span>
                                  </li>
                                ))}
                              </ul>
                            )}
                          </div>
                        </div>

                        {/* Inline SMS Button linking to SMS Tab */}
                        {task.actionTab === 'sms' && (
                           <div className="ml-10 mt-3">
                             <button onClick={(e) => { e.stopPropagation(); setActiveTab('sms'); window.scrollTo(0,0); }} 
                               className="bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 hover:bg-indigo-200 transition-colors shadow-sm border border-indigo-200">
                               <Icons.Send /> SMS প্যানেলে যান
                             </button>
                           </div>
                        )}

                        {/* Show Mistake or Tip */}
                        {!isDone && (task.mistake || task.tip) && (
                          <div className="ml-10 mt-3 space-y-2 pr-2">
                            {task.mistake && (
                              <div className="bg-red-50 border border-red-100 rounded-lg p-3">
                                <h4 className="text-[11px] font-bold text-red-800 mb-1 flex items-center gap-1 uppercase tracking-wider">
                                  <Icons.XCircle /> কী ভুল হতে পারে
                                </h4>
                                <p className="text-sm text-red-700/90 font-medium leading-snug">{task.mistake}</p>
                              </div>
                            )}
                            {task.tip && (
                              <div className="bg-amber-50 border border-amber-100 rounded-lg p-3">
                                <h4 className="text-[11px] font-bold text-amber-800 mb-1 flex items-center gap-1 uppercase tracking-wider">
                                  <Icons.Lightbulb /> টিপস
                                </h4>
                                <p className="text-sm text-amber-800/90 font-medium leading-snug">{task.tip}</p>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          );
        }

        // --- TALLY COUNTER WITH SPECIAL CASES ---
        function TallyCounter({ tally, setTally, totalVotes, tallyReports, setTallyReports, specialVotes, setSpecialVotes, testVoteText, setTestVoteText }) {
          const [editingId, setEditingId] = useState(null);
          const [editForm, setEditForm] = useState({ male: 0, female: 0, tg: 0 });
          const [actionModal, setActionModal] = useState(null); // { type: 'challenged', action: 'add' }

          const specialVoteLabels = {
            challenged: "চ্যালেঞ্জ ভোট",
            test: "টেস্ট ভোট (49MA)",
            asd: "ASD ভোট",
            proxy: "প্রক্সি (CSV)",
            blind: "অন্ধ/অশক্ত"
          };

          const updateCount = (type, increment) => {
            setTally(prev => ({
              ...prev,
              [type]: Math.max(0, prev[type] + (increment ? 1 : -1))
            }));
          };

          // Handles special vote that increments EVM count
          const initiateSpecialAction = (type, action) => {
             setActionModal({ type, action });
          };

          const confirmSpecialAction = (gender) => {
             if(!actionModal) return;
             const increment = actionModal.action === 'add' ? 1 : -1;
             
             // Update special counter
             setSpecialVotes(prev => ({
                ...prev, 
                [actionModal.type]: Math.max(0, prev[actionModal.type] + increment)
             }));
             
             // Update EVM Tally counter
             setTally(prev => ({
                ...prev,
                [gender]: Math.max(0, prev[gender] + increment)
             }));

             setActionModal(null);
          };

          // Tendered vote logic (Does NOT update EVM count)
          const updateTendered = (increment) => {
             setSpecialVotes(prev => ({
                ...prev,
                tendered: Math.max(0, prev.tendered + (increment ? 1 : -1))
             }));
          };

          const handleReset = () => {
            if(window.confirm("আপনি কি নিশ্চিত যে বর্তমান ট্যালি জিরো (0) করতে চান? (আপনার সেভ করা রিপোর্ট মুছবে না)")) {
              setTally({ male: 0, female: 0, tg: 0 });
            }
          };

          const handleSaveReport = () => {
            const times = ["9 AM", "11 AM", "1 PM", "3 PM", "5 PM", "6 PM (Final)"];
            const defaultTime = times[Math.min(tallyReports.length, times.length - 1)];
            const timeLabel = window.prompt("এই রিপোর্টের সময় দিন (যেমন: 9 AM, 11 AM):", defaultTime);
            
            if (timeLabel) {
              const newReport = {
                id: Date.now(),
                timeLabel: timeLabel,
                total: totalVotes,
                male: tally.male,
                female: tally.female,
                tg: tally.tg,
                timestamp: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + ' (Manual)'
              };
              setTallyReports([...tallyReports, newReport]);
            }
          };

          const deleteReport = (id) => {
            if(window.confirm("আপনি কি এই রিপোর্টটি মুছে ফেলতে চান?")) {
              setTallyReports(tallyReports.filter(r => r.id !== id));
            }
          };

          const startEdit = (report) => {
            setEditingId(report.id);
            setEditForm({ male: report.male, female: report.female, tg: report.tg });
          };

          const saveEdit = (id) => {
            setTallyReports(prev => prev.map(r => {
              if (r.id === id) {
                const male = parseInt(editForm.male) || 0;
                const female = parseInt(editForm.female) || 0;
                const tg = parseInt(editForm.tg) || 0;
                return { ...r, male, female, tg, total: male + female + tg };
              }
              return r;
            }));
            setEditingId(null);
          };

          return (
            <div className="space-y-5 relative">
              <div className="flex justify-between items-center px-1">
                <h2 className="text-xl font-bold text-slate-800">ম্যানুয়াল ট্যালি (Tally)</h2>
                <button onClick={handleReset} className="text-xs font-bold bg-red-100 hover:bg-red-200 text-red-600 px-3 py-1.5 rounded-lg transition-colors border border-red-200">
                  Reset Tally
                </button>
              </div>

              {/* ACTION MODAL FOR SPECIAL VOTES */}
              {actionModal && (
                 <div className="absolute top-10 left-0 right-0 z-20 bg-white p-5 rounded-2xl shadow-xl border border-blue-200 animate-in fade-in zoom-in duration-200">
                    <h3 className="font-bold text-blue-900 text-lg mb-1">{specialVoteLabels[actionModal.type]}</h3>
                    <p className="text-xs text-blue-600 mb-4 font-medium">ভোটারের লিঙ্গ নির্বাচন করুন (এটি EVM কাউন্টেও যোগ হবে):</p>
                    <div className="flex gap-2 mb-4">
                       <button onClick={() => confirmSpecialAction('male')} className="flex-1 bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold py-3 rounded-xl border border-blue-300">পুরুষ</button>
                       <button onClick={() => confirmSpecialAction('female')} className="flex-1 bg-pink-100 hover:bg-pink-200 text-pink-800 font-bold py-3 rounded-xl border border-pink-300">নারী</button>
                       <button onClick={() => confirmSpecialAction('tg')} className="flex-1 bg-purple-100 hover:bg-purple-200 text-purple-800 font-bold py-3 rounded-xl border border-purple-300">TG</button>
                    </div>
                    <button onClick={() => setActionModal(null)} className="w-full py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200">বাতিল করুন</button>
                 </div>
              )}

              <div className={`transition-opacity duration-200 ${actionModal ? 'opacity-30 pointer-events-none' : ''}`}>
                 <div className="bg-slate-800 text-white p-6 rounded-2xl shadow-lg text-center relative overflow-hidden mb-5">
                   <div className="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                   <p className="text-slate-300 font-bold uppercase tracking-wider text-sm mb-1">মোট EVM ভোট</p>
                   <p className="text-6xl font-black tracking-tight">{totalVotes}</p>
                   
                   <button 
                     onClick={handleSaveReport}
                     className="mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 px-4 rounded-xl w-full flex items-center justify-center gap-2 transition-colors border border-blue-400 shadow-sm"
                   >
                     <Icons.Save /> এই মুহূর্তের হিসাব সেভ করুন
                   </button>
                 </div>

                 <div className="grid gap-3 mb-6">
                   <CounterRow label="পুরুষ (Male)" count={tally.male} onAdd={() => updateCount('male', true)} onSub={() => updateCount('male', false)} color="blue" />
                   <CounterRow label="নারী (Female)" count={tally.female} onAdd={() => updateCount('female', true)} onSub={() => updateCount('female', false)} color="pink" />
                   <CounterRow label="তৃতীয় লিঙ্গ (TG)" count={tally.tg} onAdd={() => updateCount('tg', true)} onSub={() => updateCount('tg', false)} color="purple" />
                 </div>

                 {/* SPECIAL VOTES SECTION */}
                 <div className="pt-4 border-t border-slate-200">
                    <h3 className="font-bold text-slate-800 mb-1 px-1">বিশেষ ভোট (Special EVM Votes)</h3>
                    <p className="text-[10px] text-slate-500 font-medium px-1 mb-3">এগুলোতে ক্লিক করলে EVM ট্যালি এবং বিশেষ কাউন্ট—উভয়ই বাড়বে।</p>
                    <div className="grid grid-cols-2 gap-2 mb-4">
                       <SpecialCounterBtn label="চ্যালেঞ্জ" count={specialVotes.challenged} onAdd={() => initiateSpecialAction('challenged', 'add')} onSub={() => initiateSpecialAction('challenged', 'sub')} />
                       <SpecialCounterBtn label="টেস্ট ভোট" count={specialVotes.test} onAdd={() => initiateSpecialAction('test', 'add')} onSub={() => initiateSpecialAction('test', 'sub')} />
                       <SpecialCounterBtn label="ASD" count={specialVotes.asd} onAdd={() => initiateSpecialAction('asd', 'add')} onSub={() => initiateSpecialAction('asd', 'sub')} />
                       <SpecialCounterBtn label="প্রক্সি (CSV)" count={specialVotes.proxy} onAdd={() => initiateSpecialAction('proxy', 'add')} onSub={() => initiateSpecialAction('proxy', 'sub')} />
                       <SpecialCounterBtn label="অন্ধ/অশক্ত" count={specialVotes.blind} onAdd={() => initiateSpecialAction('blind', 'add')} onSub={() => initiateSpecialAction('blind', 'sub')} />
                    </div>

                    {/* Test Vote Log Entry */}
                    {specialVotes.test > 0 && (
                       <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-5 shadow-sm">
                          <label className="block text-xs font-bold text-blue-800 mb-2">টেস্ট ভোট লগ (Form 17C এর জন্য):</label>
                          <textarea

                             </button>
                             <button onClick={() => deleteReport(report.id)} className="text-slate-400 hover:text-red-500 transition-colors">

                             </div>
                             <div className="text-right pr-14">
                               <p className="text-xs font-bold text-slate-500 uppercase tracking-wide">EVM Total</p>

                             </div>
                           </div>

                           {/* Edit Mode UI */}
                           {editingId === report.id ? (

                                   <div className="flex-1">
                                      <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Male</label>

                                   </div>
                                   <div className="flex-1">
                                      <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Female</label>

                                   <div className="flex-1">
                                      <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">TG</label>

                                </div>
                                <div className="flex gap-2">

        function CounterRow({ label, count, onAdd, onSub, color }) {
          const colorMap = {
            blue: 'bg-blue-50 border-blue-200 text-blue-800',
            pink: 'bg-pink-50 border-pink-200 text-pink-800',
            purple: 'bg-purple-50 border-purple-200 text-purple-800',
          };

          return (
            <div className={`flex items-center justify-between p-3.5 rounded-2xl border ${colorMap[color]} shadow-sm`}>
              <span className="font-bold">{label}</span>
              <div className="flex items-center gap-3">
                <button onClick={onSub} className="w-10 h-10 bg-white border shadow-sm rounded-full flex items-center justify-center active:scale-90 transition-transform text-slate-600">
                  <Icons.Minus />
                </button>
                <span className="w-10 text-center text-xl font-black">{count}</span>
                <button onClick={onAdd} className="w-12 h-12 bg-white border shadow-md rounded-full flex items-center justify-center active:scale-90 transition-transform text-slate-800">
                  <Icons.Plus />
                </button>
              </div>
            </div>
          );
        }

        function SpecialCounterBtn({ label, count, onAdd, onSub }) {
           return (
              <div className="bg-white border border-slate-200 p-2.5 rounded-xl shadow-sm flex items-center justify-between">
                 <div className="flex flex-col">
                    <span className="text-[11px] font-bold text-slate-600">{label}</span>
                    <span className="text-lg font-black text-blue-800 leading-none">{count}</span>
                 </div>

                    <button onClick={onAdd} className="w-6 h-6 bg-blue-100 text-blue-600 rounded flex items-center justify-center font-bold text-lg active:scale-90">+</button>
                    <button onClick={onSub} className="w-6 h-6 bg-slate-100 text-slate-500 rounded flex items-center justify-center font-bold text-lg active:scale-90">-</button>
                 </div>
              </div>
           );
        }

        // --- ROLE GUIDE ---
        function RoleGuide({ defaultRole }) {
          const [selectedRole, setSelectedRole] = useState(defaultRole || 'pro');

          const roleLabels = { pro: 'প্রিসাইডিং অফিসার (PrO)', p1: '১ম পোলিং অফিসার (P1)', p2: '২য় পোলিং অফিসার (P2)', p3: '৩য় পোলিং অফিসার (P3)' };

          const getTasksForRole = (stageId) => {
            return (CHECKLIST_DATA[stageId] || []).filter(task => task.role === 'all' || task.role === selectedRole);
          };

          return (
            <div className="space-y-5">
              <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <label className="block text-sm font-bold text-slate-700 mb-2">আপনার পদ (Role) বেছে নিন:</label>
                <div className="relative">
                  <select 
                    className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 font-bold text-blue-900 outline-none appearance-none"
                    value={selectedRole} 
                    onChange={e => setSelectedRole(e.target.value)}
                  >
                    <option value="pro">প্রিসাইডিং অফিসার (PrO)</option>
                    <option value="p1">১ম পোলিং অফিসার (P1)</option>
                    <option value="p2">২য় পোলিং অফিসার (P2)</option>
                    <option value="p3">৩য় পোলিং অফিসার (P3)</option>
                  </select>
                  <div className="absolute right-4 top-4 text-slate-400 pointer-events-none"><Icons.ChevronRight /></div>
                </div>
              </div>

              <h3 className="font-bold text-lg text-slate-800 px-1 pt-2 border-b pb-2 border-slate-200">
                {roleLabels[selectedRole]}-এর দায়িত্বসমূহ
              </h3>

              <div className="space-y-4">
                {STAGES.map(stage => {
                  const tasks = getTasksForRole(stage.id);
                  if (tasks.length === 0) return null;
                  
                  return (
                    <div key={stage.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                      <div className="bg-slate-50 p-3 border-b border-slate-200 font-bold text-slate-700 text-sm">
                        {stage.title}
                      </div>
                      <div className="divide-y divide-slate-100">
                        {tasks.map((task, idx) => (
                          <div key={task.id} className="p-4 flex gap-3">
                            <span className="font-bold text-blue-500 mt-0.5">{idx + 1}.</span>
                            <p className="text-sm font-medium text-slate-700 leading-relaxed">{task.text}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        }

        // --- GUIDE SECTION (FORMS & SPECIAL CASES) ---
        function GuideSection({ completedForms, toggleFormTask }) {
          const [activeSubTab, setActiveSubTab] = useState('forms'); // 'forms' or 'special'

          return (
            <div className="space-y-4">
              {/* Sub-Tab Navigation */}
              <div className="flex bg-slate-200 p-1 rounded-xl">
                <button 
                  onClick={() => setActiveSubTab('forms')}
                  className={`flex-1 py-2 text-sm font-bold rounded-lg transition-colors ${activeSubTab === 'forms' ? 'bg-white text-blue-800 shadow-sm' : 'text-slate-600'}`}
                >
                  প্যাকিং ও ফর্মস
                </button>
                <button 
                  onClick={() => setActiveSubTab('special')}
                  className={`flex-1 py-2 text-sm font-bold rounded-lg transition-colors ${activeSubTab === 'special' ? 'bg-white text-blue-800 shadow-sm' : 'text-slate-600'}`}
                >
                  বিশেষ পরিস্থিতি
                </button>
              </div>

              {activeSubTab === 'forms' && <FormsGuide completedForms={completedForms} toggleFormTask={toggleFormTask} />}
              {activeSubTab === 'special' && <SpecialCasesGuide />}
              
              {/* Common Emergency Help at the bottom */}
              <div className="mt-8 pt-4 border-t border-slate-200">
                <EmergencyHelp />
              </div>
            </div>
          );
        }
